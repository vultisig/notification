apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-worker
  labels:
    app: notification-worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notification-worker
  template:
    metadata:
      labels:
        app: notification-worker
    spec:
      containers:
        - name: notification-worker
          image: ghcr.io/vultisig/notification/notification-worker:latest
          command: ["/app/main"]
          env:
            - name: SERVER_PORT
              valueFrom:
                configMapKeyRef:
                  name: notification
                  key: server-port
            - name: SERVER_HOST
              valueFrom:
                configMapKeyRef:
                  name: notification
                  key: server-host
            - name: PRODUCTION
              valueFrom:
                configMapKeyRef:
                  name: notification
                  key: production
            - name: DATABASE_DSN
              valueFrom:
                 secretKeyRef:
                  name: notification
                  key: database-dsn
            - name: REDIS_URI
              valueFrom:
                 secretKeyRef:
                   name: notification
                   key: redis-uri
            - name: VAPID_PUBLIC_KEY
              valueFrom:
                 configMapKeyRef:
                  name: notification
                  key: vapid-public-key
            - name: VAPID_PRIVATE_KEY
              valueFrom:
                 secretKeyRef:
                  name: notification-server
                  key: vapid-private-key
            - name: VAPID_SUBSCRIBER
              valueFrom:
                 configMapKeyRef:
                  name: notification-server
                  key: vapid-subscriber
            - name: CERTIFICATE
              valueFrom:
                configMapKeyRef:
                  name: notification
                  key: certificate
            - name: CERTIFICATE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: notification
                  key: certificate-password
          volumeMounts:
            - name: certificate
              mountPath: /etc/notification/sandbox.p12
              subPath: sandbox.p12
              readOnly: true
          ports:
            - containerPort: 8080
              name: health
          resources:
            requests:
              memory: "32Mi"
              cpu: "50m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
      volumes:
        - name: certificate
          secret:
            secretName: notification
            items:
              - key: sandbox.p12
                path: sandbox.p12

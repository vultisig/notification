apiVersion: v1
kind: Service
metadata:
  name: notification-server
  labels:
    app: notification-server
spec:
  selector:
    app: notification-server
  ports:
    - name: http
      port: 80
      targetPort: 80
      protocol: TCP
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-server
  labels:
    app: notification-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notification-server
  template:
    metadata:
      labels:
        app: notification-server
    spec:
      containers:
        - name: notification-server
          image: ghcr.io/vultisig/notification/notification-server:latest
          command: ["/app/main", "-http", ":80"]
          ports:
            - containerPort: 80
              name: http
          env:
            - name: SERVER_PORT
              valueFrom:
                configMapKeyRef:
                  name: notification-server
                  key: server-port
            - name: SERVER_HOST
              valueFrom:
                configMapKeyRef:
                  name: notification-server
                  key: server-host
            - name: DATABASE_DSN
              valueFrom:
                 secretKeyRef:
                  name: notification-server
                  key: database-dsn
            - name: REDIS_HOST
              valueFrom:
                 secretKeyRef:
                  name: notification-server
                  key: redis-host
            - name: REDIS_PORT
              valueFrom:
                 secretKeyRef:
                  name: notification-server
                  key: redis-port
            - name: REDIS_USER
              valueFrom:
                 secretKeyRef:
                  name: notification-server
                  key: redis-user
            - name: REDIS_PASSWORD
              valueFrom:
                 secretKeyRef:
                  name: notification-server
                  key: redis-password
            - name: REDIS_DB
              valueFrom:
                 secretKeyRef:
                  name: notification-server
                  key: redis-db
            - name: VAPID_PUBLIC_KEY
              valueFrom:
                 secretKeyRef:
                  name: notification-server
                  key: vapid-public-key
            - name: VAPID_PRIVATE_KEY
              valueFrom:
                 secretKeyRef:
                  name: notification-server
                  key: vapid-private-key
            - name: VAPID_SUBSCRIBER
              valueFrom:
                 configMapKeyRef:
                  name: notification-server
                  key: vapid-subscriber
          resources:
            requests:
              memory: "32Mi"
              cpu: "50m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          readinessProbe:
            httpGet:
              path: /healthz
              port: 80
          livenessProbe:
            httpGet:
              path: /healthz
              port: 80